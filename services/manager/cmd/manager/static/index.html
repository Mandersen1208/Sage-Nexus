<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sage Manager</title>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --border: #2a2a45;
    --accent: #7c5cbf;
    --accent2: #c084fc;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0a0a12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent2); letter-spacing: 0.05em; }
  .agent-dots { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .agent-dot {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted); padding: 2px 8px;
    border: 1px solid var(--border); border-radius: 999px;
    white-space: nowrap;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.healthy { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error { background: var(--red); }
  .dot.stale { background: var(--yellow); }

  .refresh-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer;
    font-size: 12px; white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--accent); }
  .auto-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--surface); }
  .tab {
    padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent;
    color: var(--muted); font-size: 13px; user-select: none;
  }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; padding: 16px 20px; }
  .panel.active { display: block; }

  /* Request log */
  .request-list { display: flex; flex-direction: column; gap: 8px; }
  .request-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
  }
  .request-header {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    cursor: pointer; user-select: none;
  }
  .request-header:hover { background: var(--surface2); }
  .req-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .req-status.ok { background: var(--green); }
  .req-status.error { background: var(--red); }
  .req-id { font-family: monospace; font-size: 11px; color: var(--muted); }
  .req-preview { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .req-agents { font-size: 11px; color: var(--accent); }
  .req-time { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
  .request-card.open .chevron { transform: rotate(90deg); }

  .request-body { display: none; border-top: 1px solid var(--border); }
  .request-card.open .request-body { display: block; }

  .section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px;
  }

  .handoff-list { display: flex; flex-direction: column; gap: 10px; }
  .handoff {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .handoff-meta {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .handoff-agent { font-weight: 600; color: var(--accent2); font-size: 12px; }
  .handoff-role {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  }
  .handoff-model { font-size: 11px; color: var(--muted); margin-left: auto; }
  .handoff-tools { font-size: 11px; color: var(--accent); }
  .handoff-reply {
    padding: 10px 12px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    max-height: 500px; overflow-y: auto; color: var(--text);
  }
  .no-reply { padding: 10px 12px; color: var(--muted); font-style: italic; font-size: 12px; }

  pre.io-block {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px;
    white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto;
    color: var(--text);
  }
  .error-text { color: var(--red); font-family: monospace; font-size: 12px; }

  /* Error panel */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--accent2); }

  .error-list { display: flex; flex-direction: column; gap: 6px; }
  .error-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; display: flex; flex-direction: column; gap: 4px;
  }
  .error-row-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .err-kind { font-size: 11px; padding: 1px 7px; border-radius: 3px; background: #3b1818; color: var(--red); border: 1px solid #5c2020; }
  .err-agent { font-size: 12px; color: var(--accent2); }
  .err-tool { font-size: 11px; color: var(--accent); }
  .err-time { font-size: 11px; color: var(--muted); margin-left: auto; }
  .err-msg { font-size: 12px; color: var(--text); font-family: monospace; opacity: 0.8; }

  /* Agents panel */
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .agent-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px;
  }
  .agent-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .agent-card-name { font-weight: 600; font-size: 13px; flex: 1; }
  .agent-cap { font-size: 11px; color: var(--muted); padding: 1px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; margin-right: 4px; }
  .agent-detail { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⬡ Sage Manager</h1>
  <div class="agent-dots" id="agentDots"></div>
  <label class="auto-label">
    <input type="checkbox" id="autoRefresh" checked> Auto
  </label>
  <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('requests', this)">Requests</div>
  <div class="tab" onclick="switchTab('errors', this)">Errors</div>
  <div class="tab" onclick="switchTab('agents', this)">Agents</div>
</div>

<div class="panel active" id="panel-requests">
  <div class="request-list" id="requestList"><div class="empty">Loading…</div></div>
</div>

<div class="panel" id="panel-errors">
  <div class="stats-grid" id="errorStats"></div>
  <div class="error-list" id="errorList"><div class="empty">Loading…</div></div>
</div>

<div class="panel" id="panel-agents">
  <div class="agents-grid" id="agentsGrid"><div class="empty">Loading…</div></div>
</div>

<script>
const BASE = '';

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString();
}

function elapsed(ts) {
  if (!ts) return '';
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

function escape(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Requests ──────────────────────────────────────────────────────────────────

async function loadRequests() {
  const res = await fetch(BASE + '/agent-response-logs').catch(() => null);
  if (!res?.ok) { document.getElementById('requestList').innerHTML = '<div class="empty">Could not reach manager</div>'; return; }
  const logs = await res.json();
  const list = Array.isArray(logs) ? logs : (logs.logs ?? []);
  if (!list.length) { document.getElementById('requestList').innerHTML = '<div class="empty">No requests yet</div>'; return; }

  const html = list.slice().reverse().map(log => {
    const hasError = !!log.error;
    const input = typeof log.input === 'string' ? log.input : JSON.stringify(log.input ?? '', null, 2);
    const output = typeof log.output === 'string' ? log.output : JSON.stringify(log.output ?? '', null, 2);
    const agents = (log.agents ?? []).join(' → ');
    const preview = input.slice(0, 120).replace(/\n/g, ' ');
    const id = log.request_id ?? '';

    const handoffsHtml = (log.handoffs ?? []).map(h => {
      const tools = h.tool_calls?.length ? `<span class="handoff-tools">${escape(h.tool_calls.join(', '))}</span>` : '';
      const replyHtml = h.reply
        ? `<div class="handoff-reply">${escape(h.reply)}</div>`
        : `<div class="no-reply">no reply captured</div>`;
      return `
        <div class="handoff">
          <div class="handoff-meta">
            <span class="handoff-agent">${escape(h.agent_id)}</span>
            <span class="handoff-role">${escape(h.role)}</span>
            ${tools}
            <span class="handoff-model">${escape(h.model ?? '')}</span>
          </div>
          ${replyHtml}
        </div>`;
    }).join('');

    const errorHtml = log.error ? `
      <div class="section">
        <div class="section-label">Error</div>
        <div class="error-text">${escape(log.error)}</div>
      </div>` : '';

    const toolErrorsHtml = log.tool_errors?.length ? `
      <div class="section">
        <div class="section-label">Tool Errors</div>
        ${log.tool_errors.map(te => `<div class="error-text">${escape(te.agent)} / ${escape(te.tool)}: ${escape(te.error)}</div>`).join('')}
      </div>` : '';

    return `
      <div class="request-card" id="req-${id}">
        <div class="request-header" onclick="toggleCard('req-${id}')">
          <div class="req-status ${hasError ? 'error' : 'ok'}"></div>
          <span class="req-id">${id.slice(0,8)}</span>
          <span class="req-preview">${escape(preview)}</span>
          <span class="req-agents">${escape(agents)}</span>
          <span class="req-time">${elapsed(log.timestamp)}</span>
          <span class="chevron">▶</span>
        </div>
        <div class="request-body">
          <div class="section">
            <div class="section-label">Input</div>
            <pre class="io-block">${escape(input)}</pre>
          </div>
          ${handoffsHtml ? `<div class="section"><div class="section-label">Agent Chain</div><div class="handoff-list">${handoffsHtml}</div></div>` : ''}
          <div class="section">
            <div class="section-label">Final Output</div>
            <pre class="io-block">${escape(output)}</pre>
          </div>
          ${errorHtml}
          ${toolErrorsHtml}
        </div>
      </div>`;
  }).join('');

  document.getElementById('requestList').innerHTML = html;
}

function toggleCard(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ── Errors ────────────────────────────────────────────────────────────────────

async function loadErrors() {
  const res = await fetch(BASE + '/orchestrator/errors').catch(() => null);
  if (!res?.ok) { document.getElementById('errorList').innerHTML = '<div class="empty">Could not reach manager</div>'; return; }
  const data = await res.json();

  const stats = data.stats_15m ?? {};
  const byKind = stats.by_kind ?? {};
  const statsHtml = `
    <div class="stat-card"><div class="stat-label">Total (15m)</div><div class="stat-value">${stats.total ?? 0}</div></div>
    ${Object.entries(byKind).map(([k,v]) => `<div class="stat-card"><div class="stat-label">${escape(k)}</div><div class="stat-value">${v}</div></div>`).join('')}
  `;
  document.getElementById('errorStats').innerHTML = statsHtml;

  const recent = data.recent ?? [];
  if (!recent.length) { document.getElementById('errorList').innerHTML = '<div class="empty">No errors</div>'; return; }

  const html = recent.slice().reverse().map(e => `
    <div class="error-row">
      <div class="error-row-meta">
        <span class="err-kind">${escape(e.kind)}</span>
        <span class="err-agent">${escape(e.agent)}</span>
        ${e.tool ? `<span class="err-tool">${escape(e.tool)}</span>` : ''}
        <span class="err-time">${fmt(e.timestamp)}</span>
      </div>
      <div class="err-msg">${escape(e.error)}</div>
    </div>`).join('');
  document.getElementById('errorList').innerHTML = html;
}

// ── Agents ────────────────────────────────────────────────────────────────────

async function loadAgents() {
  const [healthRes, dotRes] = await Promise.all([
    fetch(BASE + '/agents/health').catch(() => null),
    fetch(BASE + '/health').catch(() => null),
  ]);

  if (!healthRes?.ok) { document.getElementById('agentsGrid').innerHTML = '<div class="empty">Could not reach manager</div>'; return; }
  const agents = await healthRes.json();
  const list = Array.isArray(agents) ? agents : (agents.agents ?? Object.values(agents));

  const now = Math.floor(Date.now() / 1000);
  const dotsHtml = list.map(a => {
    const stale = now - (a.last_seen ?? 0) > 120;
    const cls = stale ? 'stale' : 'healthy';
    const short = (a.agent_id ?? a.id ?? '').replace('AGT-', '').replace('-agent', '');
    return `<div class="agent-dot"><div class="dot ${cls}"></div>${escape(short)}</div>`;
  }).join('');
  document.getElementById('agentDots').innerHTML = dotsHtml || '<span style="color:var(--muted);font-size:12px">no agents</span>';

  const html = list.map(a => {
    const stale = now - (a.last_seen ?? 0) > 120;
    const dotCls = stale ? 'stale' : 'healthy';
    const caps = (a.capabilities ?? []).map(c => `<span class="agent-cap">${escape(c)}</span>`).join('');
    return `
      <div class="agent-card">
        <div class="agent-card-header">
          <div class="dot ${dotCls}"></div>
          <div class="agent-card-name">${escape(a.agent_id ?? a.id ?? '?')}</div>
        </div>
        <div>${caps}</div>
        <div class="agent-detail">Last seen: ${elapsed(a.last_seen)}</div>
        ${a.endpoint ? `<div class="agent-detail">Endpoint: ${escape(a.endpoint)}</div>` : ''}
      </div>`;
  }).join('');
  document.getElementById('agentsGrid').innerHTML = html || '<div class="empty">No agents registered</div>';
}

// ── Refresh loop ──────────────────────────────────────────────────────────────

async function refreshAll() {
  await Promise.all([loadRequests(), loadErrors(), loadAgents()]);
}

let timer;
function scheduleRefresh() {
  clearTimeout(timer);
  if (document.getElementById('autoRefresh').checked) {
    timer = setTimeout(async () => { await refreshAll(); scheduleRefresh(); }, 5000);
  }
}
document.getElementById('autoRefresh').addEventListener('change', scheduleRefresh);

refreshAll().then(scheduleRefresh);
</script>
</body>
</html>
